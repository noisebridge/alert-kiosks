<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Coming Soon</title>
<style>
  * { cursor: none !important; }
  html, body {
    margin: 0;
    height: 100%;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: monospace;
  }
  h1 {
    font-size: 10rem;
    font-weight: 300;
    animation: rainbow 9s linear infinite;
  }
  @keyframes rainbow {
    0%   { color: #ff0000; }
    16%  { color: #ff8800; }
    33%  { color: #ffff00; }
    50%  { color: #00ff00; }
    66%  { color: #0088ff; }
    83%  { color: #8800ff; }

  }
